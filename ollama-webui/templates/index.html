<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.unhealthy {
            background: #f87171;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background: #f8fafc;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 10px;
        }

        .model-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .model-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .model-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
        }

        .model-item:hover {
            background: #e2e8f0;
        }

        .model-item.active {
            background: #667eea;
            color: white;
        }

        .model-item .name {
            font-weight: 600;
            font-size: 14px;
        }

        .model-item .size {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-avatar {
            background: #764ba2;
            color: white;
        }

        .message-content {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 12px 12px 0 12px;
        }

        .message.assistant .message-content {
            background: #f1f5f9;
            border-radius: 12px 12px 12px 0;
        }

        .message-content pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-content code {
            background: #1e293b;
            color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content p:first-child {
            margin-top: 0;
        }

        .message-content p:last-child {
            margin-bottom: 0;
        }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            background: white;
        }

        .input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            resize: none;
            min-height: 48px;
            max-height: 200px;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            height: 48px;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .settings-panel {
            padding: 20px;
            border-top: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .settings-row {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .setting-item {
            flex: 1;
        }

        .setting-item label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 5px;
        }

        .setting-item input {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        .clear-button {
            padding: 8px 16px;
            background: #f87171;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-button:hover {
            background: #ef4444;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            text-align: center;
            padding: 40px;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #1e293b;
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .sidebar {
                display: none;
            }

            .sidebar.mobile-open {
                display: flex;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                z-index: 100;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Ollama Web UI</h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2>Select Model</h2>
                    <select class="model-select" id="modelSelect">
                        <option value="">Loading models...</option>
                    </select>
                </div>
                <div class="model-list" id="modelList">
                    <!-- Models will be loaded here -->
                </div>
                <div class="settings-panel">
                    <div class="settings-row">
                        <div class="setting-item">
                            <label>Temperature</label>
                            <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
                        </div>
                        <div class="setting-item">
                            <label>Max Tokens</label>
                            <input type="number" id="maxTokens" placeholder="Unlimited" min="1">
                        </div>
                    </div>
                    <button class="clear-button" id="clearChat">Clear Chat</button>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-state">
                        <h3>👋 Welcome to Ollama Web UI</h3>
                        <p>Select a model from the sidebar and start chatting!</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="input-container">
                        <textarea 
                            class="chat-input" 
                            id="chatInput" 
                            placeholder="Type your message here..."
                            rows="1"
                        ></textarea>
                        <button class="send-button" id="sendButton">
                            Send
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let currentModel = '';
        let messages = [];
        let isGenerating = false;

        // DOM Elements
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const modelSelect = document.getElementById('modelSelect');
        const modelList = document.getElementById('modelList');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const temperatureInput = document.getElementById('temperature');
        const maxTokensInput = document.getElementById('maxTokens');
        const clearChatButton = document.getElementById('clearChat');

        // Initialize
        async function init() {
            await checkHealth();
            await loadModels();
            setupEventListeners();
        }

        // Check Ollama health
        async function checkHealth() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                if (data.status === 'healthy') {
                    statusDot.classList.remove('unhealthy');
                    statusText.textContent = 'Connected';
                } else {
                    statusDot.classList.add('unhealthy');
                    statusText.textContent = 'Disconnected';
                }
            } catch (error) {
                statusDot.classList.add('unhealthy');
                statusText.textContent = 'Error';
            }
        }

        // Load available models
        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                const data = await response.json();
                const models = data.models || [];

                // Update select dropdown
                modelSelect.innerHTML = models.length > 0 
                    ? models.map(m => `<option value="${m.name}">${m.name}</option>`).join('')
                    : '<option value="">No models available</option>';

                // Update model list
                modelList.innerHTML = models.length > 0
                    ? models.map(m => `
                        <div class="model-item" data-model="${m.name}">
                            <div class="name">${m.name}</div>
                            <div class="size">${formatSize(m.size)}</div>
                        </div>
                    `).join('')
                    : '<div style="padding: 20px; text-align: center; color: #64748b;">No models available. Pull a model using Ollama CLI.</div>';

                // Select first model if available
                if (models.length > 0 && !currentModel) {
                    selectModel(models[0].name);
                }

                // Add click handlers
                document.querySelectorAll('.model-item').forEach(item => {
                    item.addEventListener('click', () => {
                        selectModel(item.dataset.model);
                    });
                });
            } catch (error) {
                console.error('Failed to load models:', error);
                modelSelect.innerHTML = '<option value="">Failed to load models</option>';
            }
        }

        // Select a model
        function selectModel(modelName) {
            currentModel = modelName;
            modelSelect.value = modelName;

            // Update active state
            document.querySelectorAll('.model-item').forEach(item => {
                item.classList.toggle('active', item.dataset.model === modelName);
            });
        }

        // Format file size
        function formatSize(bytes) {
            if (!bytes) return 'Unknown size';
            const gb = bytes / (1024 * 1024 * 1024);
            return `${gb.toFixed(2)} GB`;
        }

        // Send message
        async function sendMessage() {
            const content = chatInput.value.trim();
            if (!content || !currentModel || isGenerating) return;

            // Add user message
            messages.push({ role: 'user', content });
            addMessageToUI('user', content);
            chatInput.value = '';

            // Generate response
            isGenerating = true;
            sendButton.disabled = true;
            sendButton.innerHTML = '<span class="loading"></span>';

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: messages,
                        stream: true,
                        temperature: parseFloat(temperatureInput.value) || 0.7,
                        max_tokens: maxTokensInput.value ? parseInt(maxTokensInput.value) : null
                    })
                });

                if (!response.ok) throw new Error('Failed to generate response');

                // Create assistant message container
                const assistantMessageDiv = document.createElement('div');
                assistantMessageDiv.className = 'message assistant';
                assistantMessageDiv.innerHTML = `
                    <div class="message-avatar">AI</div>
                    <div class="message-content"></div>
                `;
                chatMessages.appendChild(assistantMessageDiv);
                const contentDiv = assistantMessageDiv.querySelector('.message-content');

                // Stream response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') continue;

                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.message?.content) {
                                    assistantContent += parsed.message.content;
                                    contentDiv.textContent = assistantContent;
                                    chatMessages.scrollTop = chatMessages.scrollHeight;
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }

                // Add assistant message to history
                messages.push({ role: 'assistant', content: assistantContent });

            } catch (error) {
                console.error('Error generating response:', error);
                addMessageToUI('assistant', `Error: ${error.message}`);
            } finally {
                isGenerating = false;
                sendButton.disabled = false;
                sendButton.textContent = 'Send';
            }
        }

        // Add message to UI
        function addMessageToUI(role, content) {
            // Remove empty state if present
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${role === 'user' ? 'U' : 'AI'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Clear chat
        function clearChat() {
            messages = [];
            chatMessages.innerHTML = `
                <div class="empty-state">
                    <h3>👋 Welcome to Ollama Web UI</h3>
                    <p>Select a model from the sidebar and start chatting!</p>
                </div>
            `;
        }

        // Setup event listeners
        function setupEventListeners() {
            // Model selection
            modelSelect.addEventListener('change', (e) => {
                selectModel(e.target.value);
            });

            // Send message
            sendButton.addEventListener('click', sendMessage);

            // Enter key to send
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Auto-resize textarea
            chatInput.addEventListener('input', () => {
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 200) + 'px';
            });

            // Clear chat
            clearChatButton.addEventListener('click', clearChat);

            // Periodic health check
            setInterval(checkHealth, 30000);
        }

        // Start
        init();
    </script>
</body>
</html>

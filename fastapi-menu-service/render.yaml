services:
  - type: web
    name: menu-ocr-api
    runtime: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --loop uvloop --http httptools
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: API_TITLE
        value: Menu OCR API
      - key: API_VERSION
        value: 1.0.0
      - key: API_PREFIX
        value: /api/v1
      - key: DEBUG
        value: false
      - key: REDIS_HOST
        fromDatabase:
          name: menu-ocr-redis
          property: host
      - key: REDIS_PORT
        fromDatabase:
          name: menu-ocr-redis
          property: port
      - key: REDIS_PASSWORD
        fromDatabase:
          name: menu-ocr-redis
          property: password
      - key: REDIS_DB
        value: 0
      - key: REDIS_TTL
        value: 3600
      - key: SUPABASE_URL
        value: https://jlfqzcaospvspmzbvbxd.supabase.co
      - key: SUPABASE_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsZnF6Y2Fvc3B2c3BtemJ2YnhkIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2MTM3MDMzNiwiZXhwIjoyMDc2OTQ2MzM2fQ.5xdkvyJSsza79Iz3kiASMEE22WhNbBktQD6QBb2UgBY
      - key: SUPABASE_BUCKET
        value: menu-images
      - key: OPENAI_API_KEY
        value: your-openai-api-key
      - key: ANTHROPIC_API_KEY
        value: your-anthropic-api-key
      - key: OPENROUTER_API_KEY
        value: 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

databases:
  - name: menu-ocr-redis
    databaseName: menu-ocr-redis
    user: redis
    plan: starter


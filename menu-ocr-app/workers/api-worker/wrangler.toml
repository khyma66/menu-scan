name = "menu-ocr-api-worker"
main = "src/main.py"
compatibility_date = "2025-01-01"

[vars]
SUPABASE_URL = ""
SUPABASE_SERVICE_ROLE_KEY = ""
SUPABASE_JWT_SECRET = ""
SUPABASE_ANON_KEY = ""
DEV_BYPASS_AUTH = "true"
DEV_BYPASS_USER_ID = "00000000-0000-0000-0000-000000000001"
DEV_BYPASS_EMAIL = "dev-bypass@example.com"
DEV_BYPASS_COUNTRY = "IN"
R2_BUCKET = ""
R2_ACCESS_KEY_ID = ""
R2_SECRET_ACCESS_KEY = ""
CF_ACCOUNT_ID = ""
CF_API_TOKEN = ""

[[queues.producers]]
binding = "OCR_QUEUE"
queue = "menu-ocr-jobs"

[[r2_buckets]]
binding = "MENU_IMAGES"
bucket_name = ""
preview_bucket_name = ""
